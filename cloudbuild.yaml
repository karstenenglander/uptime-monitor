steps:
  # Build the container image
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${COMMIT_SHA}",
        ".",
      ]

  # Push the container image to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${COMMIT_SHA}",
      ]

  # Terraform steps
  - name: "hashicorp/terraform:latest"
    args: ["init"]
  - name: "hashicorp/terraform:latest"
    args:
      [
        "plan",
        "-var",
        "cloud_build_image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${COMMIT_SHA}",
      ]
  - name: "hashicorp/terraform:latest"
    args:
      [
        "apply",
        "-auto-approve",
        "-var",
        "cloud_build_image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${COMMIT_SHA}",
      ]

    # Goose Migrations
  - id: install-proxy
    name: gcr.io/cloud-builders/wget
    entrypoint: sh
    args:
      - -c
      - |
        wget -O /workspace/cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.22.1/cloud-sql-proxy.linux.amd64
        chmod +x /workspace/cloud-sql-proxy

  - id: migrate
    waitFor: ["install-proxy"]
    name: golang:1.26
    entrypoint: sh
    env:
      - "DATABASE_NAME=${_DATABASE_NAME}"
      - "DATABASE_USER=${_DATABASE_USER}"
      - "DATABASE_PORT=${_DATABASE_PORT}"
      - "INSTANCE_CONNECTION_NAME=${_INSTANCE_CONNECTION_NAME}"
    args:
      - "-c"
      - |
        apt-get update && apt-get install -y postgresql-client
        /workspace/cloud-sql-proxy ${_INSTANCE_CONNECTION_NAME} --port ${_DATABASE_PORT} & until pg_isready -h 127.0.0.1 -p 5432; do sleep 1; done
        # Cloud SQL Proxy is now up and running, add your own logic below to connect
        go install github.com/pressly/goose/v3/cmd/goose@latest
        psql -h 127.0.0.1 -p 5432 -U ${_DATABASE_USER} -d ${_DATABASE_NAME} -c "GRANT ALL ON SCHEMA public TO \"${_DATABASE_USER}\";"
        export PGPASSWORD=$(curl -s "http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token" -H "Metadata-Flavor: Google" | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
        $(go env GOPATH)/bin/goose -dir /workspace/internal/adapters/postgresql/migrations postgres "host=127.0.0.1 port=5432 user=${_DATABASE_USER} dbname=${_DATABASE_NAME} sslmode=disable" up

substitutions:
  _DATABASE_USER: 755712906263-compute@developer
  _DATABASE_NAME: uptime-database
  _INSTANCE_CONNECTION_NAME: englander-suite:us-east4:uptime-database-instance
  _DATABASE_PORT: "5432"
  _SERVICE: uptime-monitor-gcr
  _REGION: us-east4
  _REPO: docker-artifact-repository

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${COMMIT_SHA}"
